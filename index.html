<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>js lessons</title>
    <script src="./script.js" defer></script>
    <style>

        *, *::before, *::after {
            box-sizing: border-box;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 400px;
            height: 400px;
            margin-inline: auto;
        }

        label {
            input{
                width: 100%;
                display: inline-block;
                padding: 8px 16px;
                background: azure;
            }
        }

        .value{
            padding: 8px 16px;
            border-bottom: 1px  solid grey;
            text-transform: capitalize;
        }

    </style>
</head>
<body>
<div class="container">
    <label> <input type="text" name="search" class="search" /> </label>
    <div class="value">
        <span>default:</span>
        <span id="default"></span>
    </div>
    <div class="value">
        <span>debounce:</span>
        <span id="debounce"></span>
    </div>
    <div class="value">
        <span>throttle:</span>
        <span id="throttle"></span>
    </div>
</div>
</body>
</html>
