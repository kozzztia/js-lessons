<script>
    function toWeirdCase(string){
        return string
        .toLowerCase()
        .split(' ')
        .map(word =>
            word.split('')
            .map((letter, index) =>  (index % 2 === 0 ) ? letter.toUpperCase() : letter)
            .join('')
        )
        .join(' ')
    }

    console.log(toWeirdCase('text for yeat'))




</script>
