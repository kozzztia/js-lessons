<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>js lessons</title>
    <script src="./script.js" defer></script>
    <style>
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 400px;
            margin-inline: auto;
        }

        .nav {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            z-index: 100;

            button {
                flex: 1;
                background: green;
                transition: all .2s ease;

                &.active {
                    background: red;
                }
            }
        }

        .tabs {
            z-index: 90;
            flex: 1;
            position: relative;
            overflow: hidden;

            .tab {
                position: absolute;
                box-sizing: border-box;
                width: 100%;
                height: 100%;
                padding: 20px;
                border: 1px solid black;
                transform: translateY(-100%);
                transition: transform .2s ease, opacity .2s ease, visibility 0s ease ;
                top: 0;
                left: 0;
                opacity: 0;
                visibility: hidden;
                background: aqua;

                &.active {
                    opacity: 1;
                    position: relative;
                    visibility: visible;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button class="btn" data-attr="1">One</button>
        <button class="btn" data-attr="2">Two</button>
        <button class="btn" data-attr="3">Three</button>
    </div>
    <div class="tabs">
        <div class="tab" data-attr="1">lorem ipsum 1</div>
        <div class="tab" data-attr="2">lorem ipsum 2</div>
        <div class="tab" data-attr="3">lorem ipsum 3</div>
    </div>
</div>
</body>
</html>
