<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>js lessons</title>
    <script src="./script.js" defer></script>
    <style>
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 400px;
            margin-inline: auto;
        }

        .nav {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            z-index: 100;

            label {
                flex: 1;

                input{
                    width: 100%;
                    display: block;
                    padding: 8px 16px;
                    background: azure;
                }

                &.active {
                    background: red;
                }
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <label> <input type="text" name="search" class="search" /> </label>
    </div>
</div>
</body>
</html>
